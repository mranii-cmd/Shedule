version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: mysql-edt
    env_file:
      - ./server/.env
    volumes:
      - mysql-data:/var/lib/mysql
      - ./server/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build: 
      context: ./server
      dockerfile: Dockerfile
    container_name: edt-api
    env_file:
      - ./server/.env
    depends_on:
      mysql:
        condition: service_healthy
    ports: 
      - "4000:4000"
    restart: unless-stopped

  frontend:
    image: nginx:alpine
    container_name: edt-frontend
    ports:
      - "8080:80"
    volumes: 
      - ./:/usr/share/nginx/html:ro
    depends_on:
      - api
    restart: unless-stopped

  adminer:
    image: adminer:latest
    container_name: adminer
    restart: unless-stopped
    ports:
      - "8081:8080"
    depends_on:
      - mysql

volumes:
  mysql-data:
